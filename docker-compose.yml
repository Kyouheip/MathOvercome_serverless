services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: mathovercome-dynamodb
    user: root
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    volumes:
      - dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: mathovercome-dynamodb-setup
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    volumes:
      - ./db/dynamodb:/dynamodb
    entrypoint: ["/bin/sh", "/dynamodb/init.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: local
    container_name: mathovercome-backend
    ports:
      - "8080:8080"
    environment:
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: "8080"
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: mathovercome-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  dynamodb-data:
